  Мы поможем тебе найти работу мечты в индустрии красоты — быстро и просто. Больше не нужно писать в десятки чатов и ждать ответа неделями!

  ✨ У нас есть открытые вакансии:
  • Модельный агент — для тех кто хочет монетизировать свою харизму
  • Оператор Live-стримов — для технических специалистов

  Всего 3 простых шага:
  🚀 Выбираешь вакансию
  📝 Заполняешь одну анкету
  💌 Получаешь приглашение на собеседование

