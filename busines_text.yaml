operator_desc: |
  **🌟 ОСНОВНЫЕ ПУНКТЫ РАБОТЫ В КОМАНДЕ**
  
  **1. 📚 ОБУЧЕНИЕ И СТАЖИРОВКА**
  Кандидатов без опыта обучают с нуля — всё будет понятно и доступно
  Каждому выделяется опытный наставник, к которому можно обращаться в любой момент
  Нет давления, грубости или стресса — поддержка оказывается на каждом этапе
  
  Обучение длится 4–5 дней, но при быстром усвоении материала может завершиться за 1–2 дня
  По окончании обучения нужно написать продюсеру: «Гриш, я всё запомнил, хочу на стажировку»
  Продюсер проведёт небольшой экзамен — запуск трансляции
  При успешном выполнении — переход на стажировку
  
  Стажировка оплачивается: это уже самостоятельные смены с моделью, но помощь наставника остаётся доступной
  Успешное прохождение стажировки = официальное вступление в команду!
  
  **2. 🗓 ГРАФИК РАБОТЫ**
  Рабочий график: 5/2 (пять дней работы, два выходных)
  Длительность смены: 4–6 часов (зависит от готовности модели)
  Время смены согласовывается совместно с моделью — возможны утренние, дневные, вечерние и ночные смены
  Требуется полная занятость — совмещение с учёбой или другой работой невозможно
  
  **3. 💰 ЗАРАБОТОК**
  Заработок напрямую зависит от твоей вовлечённости, инициативности и усилий — не от модели, времени суток или техники.  
  В первый месяц новички получают от 48 000 до 64 000 рублей
  
  Выплаты:
  Первая неделя — ежедневно
  Далее — раз в неделю
  
  Процент от общего чека:
  Первая неделя — 30%
  Начиная со второй недели — 20% (в качестве бонуса за стабильность)
  
  Примеры:
  Оператор без инициативы заработал 46 000 ₽ за первый месяц
  Активный и вовлечённый коллега — 72 000 ₽
  
  Опытные операторы (3-4 месяца) стабильно зарабатывают от 120 000 ₽ в месяц
  Выплаты производятся еженедельно на кошелёк USDT (сеть TRC20)
  Цель партнёра — помочь тебе выйти на уровень 46 000 ₽ в неделю и выше. Это реально и достижимо!
  
  **4. 🚀 КАРЬЕРНЫЙ РОСТ**
  Путь от оператора до продюсера занимает в среднем 6–8 месяцев — значительно быстрее, чем в большинстве других сфер
  
  Продюсер — это наставник и супер-оператор, который:
  Курирует несколько команд (от 4 до 10 и более)
  Обучает, даёт обратную связь, помогает с шоу и общением в чате
  Работает гибко — когда работают его команды
  
  Доход продюсера начинается от 300 000 ₽ в месяц
  Работа продюсером похожа на собственный бизнес: вкладываешься — получаешь мощный результат
  
  **5. 👥 КОЛЛЕКТИВ И АТМОСФЕРА**
  Команда состоит из осознанных, современных людей в возрасте 19–30 лет
  Подход к работе серьёзный: сфера воспринимается как профессиональная деятельность, а не «телки и бабки»
  Те, кто приходит с поверхностным отношением, быстро покидают проект
  Здесь ценят труд, развитие и результат
  Хотя студия онлайн и тимбилдинги невозможны, иногда собираемся в дискорде для неформального общения и игр
  
  **Добро пожаловать в команду, где можно расти, зарабатывать и развиваться вместе с профессионалами! 🚀**

agent_desc: |
  Супер, что заинтересовала вакансия!
  Рассказываю подробнее:
  Мы работаем по всему миру, ищем преимущественно моделей для вебкама + онлифанс.
  Методы поиска разные, этому тебя обучат с нуля.
  Мы существуем уже более 5 лет, и набрали 10000+ сотрудников!
  Ознакомиться можешь тут: https://huntme.partners/?partner=7106528625
  
  За каждую активную модель ты получаешь 10$ в сутки.
  Пример:
  Условно ты привёл 10 моделей → 10 × 10$ = 100$ в день
  У модели график 5/2 → 100$ × 5 дней = 500$
  500$ × 4 недели = 2000$ в месяц
  Доход твой неограничен — ты получаешь ровно столько, сколько работаешь!

