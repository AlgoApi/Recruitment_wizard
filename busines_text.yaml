  «ℹ️ Информация»!

base_info: |
  **💼 Найти работу мечты стало проще, чем когда-либо**

  Наш бот — это мост между вами и ведущими модельными агентствами. Мы убрали всю лишнюю сложность из процесса поиска работы.
  
  **Почему это удобно для вас?**
  
  *   **Все вакансии в одном окне:** Не нужно метаться между сайтами и соцсетями.
  *   **Быстрый отклик:** Отправляйте заявку в несколько кликов.
  *   **Прямой контакт:** После одобрения мы запишем вас на собеседование к интервьюеру, без лишних звеньев.
  *   **Это бесплатно:** Для всех использование бота полностью бесплатное.
  
  **Алгоритм действий:**
  1.  Выбирайте вакансию из списка.
  2.  Заполняйте общую анкету — мы рассмотрим вашу заявку
  3.  Получайте уведомление о статусе заявки.
  4.  При одобрении — получайте контакты для связи чтобы подобрать удобную дату!
  
  Остались вопросы или есть предложение?
  Всегда рады общению! Нажмите «Оставить обращение» — и мы свяжемся с вами в Telegram. 🤝
  
  Готовы начать? **Возвращайтесь** в главное меню и выбирайте вакансию! 🚀

