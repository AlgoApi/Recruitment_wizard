operator_desc: |
  **📚 Обучение и старт**
  - Интенсив с нуля: 4-5 дней или быстрее.
  - Личный наставник, поддержка без стресса.
  - Экзамен — запуск трансляции. Успешная сдача — начало оплачиваемой стажировки с поддержкой наставника.
  - Итог: вступление в команду.

  **🗓 График**
  - Гибкий 5/2, смена 4–6 часов.
  - Удобное время (утро/день/вечер/ночь).
  - Только полная занятость, без совмещения с учебой/работой

  **💰 Доход**
  - 1-й месяц: 48 000 – 64 000 ₽.
  - Выплаты: 1-я неделя ежедневно, далее — еженедельно.
  - Процент: 30% (1-я неделя), далее — 20%.
  - С опытом 3-4 мес.: от 120 000 ₽/мес.
  - Выплаты в USDT.
  - Цель: 46 000 ₽/неделю и выше.

  **🚀 Рост**
  - Путь от оператора до продюсера за 6-8 месяцев.
  - Продюсер курирует команды и обучает.
  - Доход продюсера — от 300 000 ₽/мес.

  **👥 Требования:**
  - Парень 18-27 лет
  - Процессор: i5 10-го поколения (H серия от 12450) или AMD Ryzen 5 1600 и выше
  - Видеокарта: от GTX 1060 6gb или аналоги AMD от 2019
  - Интернет от 100мб/с
  - ОЗУ 16гб, скорость от 2666мгц

  Добро пожаловать в команду с реальным ростом! 🚀

agent_desc: |
  📍 СУТЬ РАБОТЫ:
  Мы ищем девушек для легальной работы на топовых стримингах (без раздеваний). Ты находишь, записываешь, а мы обучаем и трудоустраиваем. Твой пассивный доход — с каждой их смены.
  
  💰 О ДЕНЬГАХ:
  • До $10 за каждую смену модели
  • Бонусы за количество + $250 за Грузию (перелёт/жильё за нас)
  • Без потолка в доходах
  • Выплаты еженедельно на крипту
  
  🚀 РЕАЛЬНЫЕ ЦИФРЫ:
  • Топовые агенты с опытом получают от $2300+/мес
  • 10 моделей = ~$1400 пассивно — это результат которого можно достичь в короткие сроки
  • Рост ограничен только тобой
  
  🎯 ПОМОЩЬ:
  • Обучение с нуля + кейсы
  • Личный наставник
  • Спонсируем софт
  • 87% агентов находят свою модель уже в первую неделю
  
  ⏰ ГРАФИК:
  Свободный, работа в удобное время. 
  Главное — стремиться к результату!
  
  Заинтересовало? Оставляй заявку и сможешь лично ознакомиться со всеми материалами и самым топовым обучением на рынке!

